name: 'Deploy API Gateway'

on:
  workflow_dispatch:  # Manual trigger only

env:
  # Secrets from GitHub
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  
  # Configuration
  GCP_REGION: us-central1
  API_GATEWAY_NAME: lean-hub-gateway
  API_GATEWAY_API: lean-hub-api
  API_GATEWAY_CONFIG: lean-hub-config
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

jobs:
  deploy-gateway:
    name: Deploy API Gateway
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate API Gateway Config from Registry
        run: |
          echo "🧠 Generating gateway config from infrastructure/services-registry.json ..."
          python3 infrastructure/generate_api_gateway_config.py \
            --registry infrastructure/services-registry.json \
            --output /tmp/api-gateway-config-updated.json \
            --project-id "${{ env.GCP_PROJECT_ID }}" \
            --region "${{ env.GCP_REGION }}" \
            --firebase-project-id "${{ env.FIREBASE_PROJECT_ID }}"
          echo "✅ Generated OpenAPI config at /tmp/api-gateway-config-updated.json"
          echo "=== First 60 lines of generated config ==="
          head -60 /tmp/api-gateway-config-updated.json

      - name: Enable Required Services
        run: |
          gcloud services enable apigateway.googleapis.com \
            servicemanagement.googleapis.com \
            servicecontrol.googleapis.com \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Create or Update API
        run: |
          # Check if API exists
          if gcloud api-gateway apis describe ${{ env.API_GATEWAY_API }} --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null; then
            echo "✅ API ${{ env.API_GATEWAY_API }} already exists"
          else
            echo "📦 Creating API ${{ env.API_GATEWAY_API }}"
            gcloud api-gateway apis create ${{ env.API_GATEWAY_API }} \
              --project=${{ env.GCP_PROJECT_ID }}
          fi

      - name: Create API Config
        id: create-config
        run: |
          # Generate unique config name with timestamp
          CONFIG_NAME="${{ env.API_GATEWAY_CONFIG }}-$(date +%Y%m%d-%H%M%S)"
          echo "config_name=$CONFIG_NAME" >> $GITHUB_OUTPUT
          
          echo "📦 Creating API Config: $CONFIG_NAME"
          gcloud api-gateway api-configs create $CONFIG_NAME \
            --api=${{ env.API_GATEWAY_API }} \
            --openapi-spec=/tmp/api-gateway-config-updated.json \
            --project=${{ env.GCP_PROJECT_ID }} \
            --backend-auth-service-account=github-actions@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          
          echo "✅ API Config created: $CONFIG_NAME"

      - name: Create or Update Gateway
        run: |
          # Check if gateway exists
          if gcloud api-gateway gateways describe ${{ env.API_GATEWAY_NAME }} \
              --location=${{ env.GCP_REGION }} \
              --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null; then
            
            echo "🔄 Updating existing gateway ${{ env.API_GATEWAY_NAME }}"
            gcloud api-gateway gateways update ${{ env.API_GATEWAY_NAME }} \
              --api=${{ env.API_GATEWAY_API }} \
              --api-config=${{ steps.create-config.outputs.config_name }} \
              --location=${{ env.GCP_REGION }} \
              --project=${{ env.GCP_PROJECT_ID }}
          else
            echo "📦 Creating new gateway ${{ env.API_GATEWAY_NAME }}"
            gcloud api-gateway gateways create ${{ env.API_GATEWAY_NAME }} \
              --api=${{ env.API_GATEWAY_API }} \
              --api-config=${{ steps.create-config.outputs.config_name }} \
              --location=${{ env.GCP_REGION }} \
              --project=${{ env.GCP_PROJECT_ID }}
          fi

      - name: Get Gateway URL
        id: gateway-url
        run: |
          # Wait a bit for gateway to be ready
          sleep 10
          
          GATEWAY_URL=$(gcloud api-gateway gateways describe ${{ env.API_GATEWAY_NAME }} \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format="value(defaultHostname)")
          
          echo "gateway_url=https://$GATEWAY_URL" >> $GITHUB_OUTPUT
          echo "✅ Gateway deployed successfully!"
          echo "🌐 Gateway URL: https://$GATEWAY_URL"

      - name: Test Gateway Health
        run: |
          GATEWAY_URL="${{ steps.gateway-url.outputs.gateway_url }}"
          
          echo "🧪 Testing gateway endpoints..."
          
          # Test Project 1 health (may fail if auth required)
          echo "Testing: $GATEWAY_URL/p1/health"
          curl -s -o /dev/null -w "Status: %{http_code}\n" "$GATEWAY_URL/p1/health" || echo "⚠️  Auth may be required"
          
          echo "Testing: $GATEWAY_URL/p2/health"
          curl -s -o /dev/null -w "Status: %{http_code}\n" "$GATEWAY_URL/p2/health" || echo "⚠️  Auth may be required"
          
          echo "Testing: $GATEWAY_URL/p3/health"
          curl -s -o /dev/null -w "Status: %{http_code}\n" "$GATEWAY_URL/p3/health" || echo "⚠️  Auth may be required"

      - name: Summary
        run: |
          echo "════════════════════════════════════════════"
          echo "✅ API Gateway Deployment Complete!"
          echo "════════════════════════════════════════════"
          echo ""
          echo "🌐 Gateway URL:"
          echo "   ${{ steps.gateway-url.outputs.gateway_url }}"
          echo ""
          echo "📍 Endpoints:"
          echo "   Project 1: ${{ steps.gateway-url.outputs.gateway_url }}/p1"
          echo "   Project 2: ${{ steps.gateway-url.outputs.gateway_url }}/p2"
          echo "   Project 3: ${{ steps.gateway-url.outputs.gateway_url }}/p3"
          echo ""
          echo "🔐 Authentication: Firebase Auth (if enabled)"
          echo "════════════════════════════════════════════"
