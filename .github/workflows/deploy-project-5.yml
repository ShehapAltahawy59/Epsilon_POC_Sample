name: 'Surgical Deploy: Project 2 RAG'

on:
  push:
    branches: [main]
    paths:
      - 'project_2/**'
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy-project.yml
    secrets: inherit
    with:
      deployment_name: Build and Deploy Project 2 RAG
      project_path: project_2
      service_name: project-2-rag
      dockerfile_path: project_2/Dockerfile
      shared_lib_version_file: project_2/shared_lib_version
      max_instances: "2"
      min_instances: "0"
      memory: 4Gi
      cpu: "2"
      enable_gpu: false
      gpu_type: nvidia-l4
      gpu_count: "1"