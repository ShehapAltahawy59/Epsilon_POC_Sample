name: Reusable Deploy Project

on:
  workflow_call:
    inputs:
      deployment_name:
        description: Friendly deployment name shown in Actions.
        required: true
        type: string
      project_path:
        description: Project directory path, e.g. project_1
        required: true
        type: string
      service_name:
        description: Cloud Run service name, e.g. project-1
        required: true
        type: string
      dockerfile_path:
        description: Path to Dockerfile, e.g. project_1/Dockerfile
        required: true
        type: string
      shared_lib_version_file:
        description: Path to shared_lib_version file.
        required: true
        type: string
      max_instances:
        description: Cloud Run max instances.
        required: false
        default: "10"
        type: string
      min_instances:
        description: Cloud Run min instances.
        required: false
        default: "0"
        type: string
      memory:
        description: Cloud Run memory setting.
        required: false
        default: "512Mi"
        type: string
      cpu:
        description: Cloud Run CPU setting.
        required: false
        default: "1"
        type: string
      extra_env_vars:
        description: Extra comma-separated env vars appended to --set-env-vars.
        required: false
        default: ""
        type: string
      enable_gpu:
        description: Enable GPU for Cloud Run service.
        required: false
        default: false
        type: boolean
      gpu_type:
        description: GPU type when enable_gpu is true, for example nvidia-l4.
        required: false
        default: nvidia-l4
        type: string
      gpu_count:
        description: Number of GPUs when enable_gpu=true.
        required: false
        default: "1"
        type: string

jobs:
  build-and-deploy:
    name: ${{ inputs.deployment_name }}
    runs-on: ubuntu-latest

    env:
      GCP_REGION: us-central1
      GAR_LOCATION: us-central1
      GAR_REPOSITORY: lean-hub
      SERVICE_NAME: ${{ inputs.service_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Read shared_libs version
        id: lib-version
        run: |
          VERSION=$(cat ${{ inputs.shared_lib_version_file }})
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using shared_libs version: $VERSION"

      - name: Checkout shared_libs at pinned version
        run: |
          VERSION=$(cat ${{ inputs.shared_lib_version_file }})
          echo "Checking out shared_libs at v$VERSION..."
          git fetch --tags
          git checkout "v$VERSION" -- shared_libs/
          echo "shared_libs checked out at v$VERSION"

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ inputs.dockerfile_path }} \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:latest \
            --build-arg PROJECT_PATH=${{ inputs.project_path }} \
            --build-arg SHARED_LIB_VERSION=${{ steps.lib-version.outputs.version }} \
            .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          DEPLOY_ENV_VARS="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},SHARED_LIB_VERSION=${{ steps.lib-version.outputs.version }}"
          if [ -n "${{ inputs.extra_env_vars }}" ]; then
            DEPLOY_ENV_VARS="$DEPLOY_ENV_VARS,${{ inputs.extra_env_vars }}"
          fi

          GPU_FLAGS=""
          if [ "${{ inputs.enable_gpu }}" = "true" ]; then
            GPU_FLAGS="--gpu=${{ inputs.gpu_count }} --gpu-type=${{ inputs.gpu_type }}"
            echo "GPU mode enabled: ${GPU_FLAGS}"
          else
            echo "GPU mode disabled"
          fi

          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --ingress all \
            --no-allow-unauthenticated \
            --set-env-vars "$DEPLOY_ENV_VARS" \
            --max-instances ${{ inputs.max_instances }} \
            --min-instances ${{ inputs.min_instances }} \
            --memory ${{ inputs.memory }} \
            --cpu ${{ inputs.cpu }} \
            ${GPU_FLAGS}

      - name: Grant API Gateway access
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --member="serviceAccount:github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --role="roles/run.invoker"

      - name: Log deployment
        run: |
          echo "${{ inputs.deployment_name }} completed"
          echo "Image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "Shared Lib Version: ${{ steps.lib-version.outputs.version }}"
          echo "Region: ${{ env.GCP_REGION }}"
